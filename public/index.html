<!DOCTYPE html>
<html>
<head>
  <title>Task Manager</title>
  <style>
    body {
      font-family: Arial;
      max-width: 600px;
      margin: 40px auto;
    }
    input, button {
      padding: 8px;
      margin: 5px 0;
    }
    li {
      margin: 8px 0;
    }
    .completed {
      text-decoration: line-through;
      color: gray;
    }
  </style>
</head>
<body>

  <h1>Task Manager</h1>

  <input type="text" id="title" placeholder="Task Title" />

  <select id="priority">
    <option value="low">Low</option>
    <option value="medium" selected>Medium</option>
    <option value="high">High</option>
  </select>

  <button onclick="addTask()">Add Task</button>

  <div>
    <button onclick="setFilter('all')">All</button>
    <button onclick="setFilter('completed')">Completed</button>
    <button onclick="setFilter('pending')">Pending</button>
  </div>

  <ul id="taskList"></ul>

<script>
const API_URL = "http://localhost:5000/tasks";

let currentFilter = "all";

async function fetchTasks() {
  const res = await fetch(API_URL);
  const tasks = await res.json();

  let filteredTasks = tasks;

  if (currentFilter === "completed") {
    filteredTasks = tasks.filter(task => task.completed);
  } else if (currentFilter === "pending") {
    filteredTasks = tasks.filter(task => !task.completed);
  }

  const list = document.getElementById("taskList");
  list.innerHTML = "";

  filteredTasks.forEach(task => {
    const li = document.createElement("li");

    li.innerHTML = `
      <span class="${task.completed ? 'completed' : ''}">
        ${task.title} (${task.priority})
      </span>
      <button onclick="toggleTask('${task._id}', ${task.completed})">
        ${task.completed ? "Undo" : "Complete"}
      </button>
      <button onclick="deleteTask('${task._id}')">
        Delete
      </button>
      <button onclick="editTask('${task._id}', '${task.title}', '${task.priority}')">
        Edit
      </button>
    `;

    list.appendChild(li);
  });
}

async function addTask() {
  const title = document.getElementById("title").value;
  const priority = document.getElementById("priority").value;

  if (!title) return alert("Enter task title");

  await fetch(API_URL, {
    method: "POST",
    headers: {
      "Content-Type": "application/json"
    },
    body: JSON.stringify({ title, priority })
  });

  fetchTasks();
}

async function deleteTask(id) {
  await fetch(`${API_URL}/${id}`, {
    method: "DELETE"
  });
  fetchTasks();
}

async function toggleTask(id, currentStatus) {
  await fetch(`${API_URL}/${id}`, {
    method: "PUT",
    headers: {
      "Content-Type": "application/json"
    },
    body: JSON.stringify({ completed: !currentStatus })
  });
  fetchTasks();
}

async function editTask(id, oldTitle, oldPriority) {
  const newTitle = prompt("Edit title:", oldTitle);
  if (!newTitle) return;

  const newPriority = prompt("Edit priority (low/medium/high):", oldPriority);

  await fetch(`${API_URL}/${id}`, {
    method: "PUT",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ title: newTitle, priority: newPriority })
  });

  fetchTasks();
}

function setFilter(filter) {
  currentFilter = filter;
  fetchTasks();
}

fetchTasks();
</script>

</body>
</html>
